<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품 상세 · YEDO LIGHTING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
:root{--teal:#00b8a9;--teal-dark:#009e90;--teal-pale:rgba(0,184,169,0.07);--teal-dim:rgba(0,184,169,0.2);--bg:#fff;--bg2:#f7f8f8;--text:#1a1a1a;--text-dim:#555;--text-faint:#aaa;--border:#e8e8e8;}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;line-height:1.6;}

/* NAV - category.html과 완전 동일 */
nav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.nav-top{display:flex;justify-content:space-between;align-items:center;padding:0 48px;height:88px;gap:20px;}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:700;letter-spacing:0.06em;color:var(--text);text-decoration:none;flex-shrink:0;line-height:1;transform:scaleY(0.85);transform-origin:left center;display:inline-block;}
.nav-logo span{color:var(--teal);}
.nav-logo small{display:block;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:300;letter-spacing:0.18em;color:var(--text-faint);margin-top:1px;transform:scaleY(1.176);transform-origin:left center;}
.nav-right{display:flex;align-items:center;gap:24px;flex:1;justify-content:flex-end;}
.nav-links{display:flex;gap:28px;}
.nav-links a{font-size:15px;color:var(--text-dim);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--teal);}
.nav-center{position:relative;max-width:280px;min-width:180px;}
.nav-search{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:8px 16px 8px 38px;font-size:15px;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.2s;}
.nav-search:focus{border-color:var(--teal);}
.nav-search::placeholder{color:var(--text-faint);}
.nav-search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:14px;pointer-events:none;}
.nav-contact{font-size:14px;font-weight:500;color:#fff;background:var(--teal);padding:8px 20px;border-radius:3px;text-decoration:none;transition:background 0.2s;}
.nav-contact:hover{background:var(--teal-dark);}
.cat-bar{border-top:1px solid var(--border);background:#fff;overflow:visible;white-space:nowrap;padding:0 48px;position:relative;z-index:400;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-bar-inner{display:inline-flex;}
.cat-btn{font-size:15px;color:var(--text-dim);background:none;border:none;padding:11px 18px;cursor:pointer;font-family:inherit;font-weight:400;white-space:nowrap;position:relative;transition:color 0.2s;}
.cat-btn::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:var(--teal);transition:width 0.2s;}
.cat-btn:hover{color:var(--teal);}
.cat-btn:hover::after{width:60%;}
.cat-item{position:relative;display:inline-block;}
.cat-dropdown{display:none;position:absolute;top:100%;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 20px rgba(0,0,0,0.12);padding:6px 0;min-width:140px;z-index:9999;}
.cat-item:hover .cat-dropdown{display:block;}
.cat-dropdown-item{display:block;width:100%;padding:9px 20px;font-size:13px;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:inherit;text-align:left;transition:color 0.15s,background 0.15s;white-space:nowrap;}
.cat-dropdown-item:hover{color:var(--teal);background:var(--teal-pale);}

/* BREADCRUMB */
.breadcrumb{padding:12px 66px;font-size:12px;color:var(--text-faint);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.breadcrumb a{color:var(--text-faint);text-decoration:none;transition:color 0.2s;}
.breadcrumb a:hover{color:var(--teal);}
.breadcrumb span{color:var(--text-dim);}

/* PRODUCT LAYOUT - 참고이미지처럼 이미지 크게 */
.product-wrap{display:grid;grid-template-columns:1fr 1fr;gap:56px;padding:48px 60px;max-width:1400px;margin:0 auto;width:100%;}

/* LEFT IMAGE */
.img-col{}
.main-img-wrap{width:100%;aspect-ratio:1;background:var(--bg2);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:12px;cursor:zoom-in;}
.main-img-wrap img{width:100%;height:100%;object-fit:contain;padding:16px;}
.img-ph{color:var(--text-faint);font-size:14px;}
.thumb-list{display:flex;gap:8px;flex-wrap:wrap;}
.thumb-item{width:80px;height:80px;border:1.5px solid var(--border);border-radius:3px;overflow:hidden;cursor:pointer;background:var(--bg2);transition:border-color 0.2s;flex-shrink:0;}
.thumb-item:hover,.thumb-item.active{border-color:var(--teal);}
.thumb-item img{width:100%;height:100%;object-fit:contain;padding:4px;}

/* RIGHT INFO */
.info-col{padding-top:8px;}
.prod-badges{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:2px;letter-spacing:0.06em;}
.badge-new{background:var(--teal);color:#fff;}
.badge-best{background:#e74c3c;color:#fff;}
.prod-cat-line{font-size:16px;color:var(--teal);margin-bottom:12px;letter-spacing:0.04em;}
.prod-name{font-size:30px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:20px;}
.prod-desc{font-size:16px;color:var(--text-dim);line-height:1.9;margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border);}

/* SPEC TABLE */
.spec-table{width:100%;border-collapse:collapse;margin-bottom:28px;}
.spec-table tr{border-bottom:1px solid var(--border);}
.spec-table tr:first-child{border-top:1px solid var(--border);}
.spec-table td{padding:12px 8px;font-size:15px;vertical-align:top;}
.spec-table td:first-child{color:var(--text-faint);width:110px;background:var(--bg2);padding-left:14px;}
.spec-table td:last-child{color:var(--text);padding-left:16px;}

/* DETAIL TABS */
.detail-tabs-section{border-top:1px solid var(--border);padding:0 48px 64px;max-width:1200px;margin:0 auto;width:100%;}
.detail-tab-bar{display:flex;border-bottom:2px solid var(--border);}
.detail-tab-btn{font-size:15px;color:var(--text-dim);background:none;border:none;padding:14px 36px;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color 0.2s,border-color 0.2s;}
.detail-tab-btn:hover{color:var(--teal);}
.detail-tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500;}
.dtab{display:none;padding:40px 0;}
.dtab.active{display:block;}
.detail-imgs img{width:100%;display:block;}
.detail-no-img{text-align:center;padding:60px;color:var(--text-faint);font-size:14px;}

/* RELATED */
.related-section{background:var(--bg2);border-top:1px solid var(--border);padding:48px;}
.related-inner{max-width:1200px;margin:0 auto;}
.related-title{font-size:18px;font-weight:700;margin-bottom:24px;}
.related-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;}
.related-card{background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;text-decoration:none;transition:box-shadow 0.2s,border-color 0.2s,transform 0.2s;display:block;}
.related-card:hover{box-shadow:0 4px 20px rgba(0,184,169,0.1);border-color:var(--teal-dim);transform:translateY(-2px);}
.related-img{height:160px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.related-img img{width:100%;height:100%;object-fit:cover;}
.related-info{padding:12px 14px;}
.related-cat{font-size:11px;color:var(--teal);letter-spacing:0.06em;margin-bottom:3px;}
.related-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;}

/* ZOOM */
#zoom-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.88);align-items:center;justify-content:center;cursor:zoom-out;}
#zoom-overlay.on{display:flex;}
#zoom-img{max-width:90vw;max-height:90vh;object-fit:contain;}

@media(max-width:900px){
  .nav-top{padding:0 20px;height:60px;}
  .nav-logo{font-size:28px;}
  .nav-links,.nav-center{display:none;}
  .breadcrumb{padding:10px 20px;}
  .product-wrap{grid-template-columns:1fr;padding:24px 20px;gap:28px;}
  .detail-tabs-section{padding:0 20px 60px;}
  .related-section{padding:48px 20px;}
  .related-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<div id="zoom-overlay" onclick="closeZoom()"><img id="zoom-img" src="" alt=""></div>

<nav>
  <div class="nav-top">
    <a href="index.html" class="nav-logo"><span>YEDO</span> LIGHTING<small>예도전기조명</small></a>
    <div class="nav-right">
      <div class="nav-links">
        <a href="index.html#about">회사소개</a>
        <a href="category.html">제품</a>
        <a href="index.html#catalogue">카탈로그</a>
        <a href="index.html#contact">문의</a>
      </div>
      <div class="nav-center">
        <span class="nav-search-ico">🔍</span>
        <input class="nav-search" id="nav-search" type="text" placeholder="제품명으로 검색...">
      </div>
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--text-dim);white-space:nowrap;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" fill="var(--teal)"/></svg>031-977-1585</span>
      <a href="index.html#contact" class="nav-contact">문의하기</a>
    </div>
  </div>
  <div class="cat-bar"><div class="cat-bar-inner" id="cat-bar-inner"></div></div>
</nav>

<div class="breadcrumb" id="breadcrumb"></div>

<div class="product-wrap">
  <!-- LEFT -->
  <div class="img-col">
    <div class="main-img-wrap" onclick="openZoom()">
      <div class="img-ph" id="main-img-ph">이미지 없음</div>
      <img id="main-img" src="" alt="" style="display:none;">
    </div>
    <div class="thumb-list" id="thumb-list"></div>
  </div>
  <!-- RIGHT -->
  <div class="info-col">
    <div class="prod-badges" id="prod-badges"></div>
    <div class="prod-cat-line" id="prod-cat-line"></div>
    <h1 class="prod-name" id="prod-name"></h1>
    <p class="prod-desc" id="prod-desc" style="display:none;"></p>
    <table class="spec-table" id="spec-table"></table>
  </div>
</div>

<!-- DETAIL TABS -->
<div class="detail-tabs-section">
  <div class="detail-tab-bar">
    <button class="detail-tab-btn active" onclick="switchTab('detail')">Detail</button>
  </div>
  <div class="dtab active" id="dtab-detail">
    <div class="detail-imgs" id="detail-imgs"><div class="detail-no-img">등록된 상세 이미지가 없습니다.</div></div>
  </div>
  </div>
</div>

<section class="related-section" id="related-section" style="display:none;">
  <div class="related-inner">
    <div class="related-title">관련 제품</div>
    <div class="related-grid" id="related-grid"></div>
  </div>
</section>

<script>
const SK='yedo_products';
const getProds=()=>{
  try{
    const data=JSON.parse(localStorage.getItem(SK))||[];
    if(data.length) return data;
  }catch{}
  // 샘플 데이터
  return[
    {name:"KS. T-LINE 레일등 LED 20W",category:"레일등",subcategory:"레일형",image:"https://ydl.co.kr/web/product/medium/202412/8fa8fe539d2148444472e6f0da009462.jpg",description:"220V/60Hz 레일형 LED 조명. T-LINE 시리즈 대표 제품으로 상업 공간에 최적화된 고효율 레일등입니다.",specs:"전압: 220V / 60Hz\n소비전력: 20W\n색온도: 3000K / 4000K",badge:"NEW"},
    {name:"KC. 직사각매입등 LED 디밍형",category:"매입등",subcategory:"직사각",image:"https://ydl.co.kr/web/product/medium/202601/dc0441927d4dfe364ca6a20935c9ba06.jpg",description:"디밍 기능이 탑재된 직사각 매입등. 밝기 조절이 가능하여 다양한 공간 연출에 적합합니다.",specs:"전압: 220V / 60Hz\n소비전력: 20W\n디밍: 가능",badge:""},
    {name:"KS. 마그네틱 SMPS 150W",category:"마그네틱",subcategory:"",image:"https://ydl.co.kr/web/product/medium/202506/967b965015ddd29ed9b5544bb1838208.jpg",description:"마그네틱 트랙 시스템용 안정기. DC48V 출력으로 안정적인 전력 공급.",specs:"전압: 220V / 60Hz\n출력: DC 48V\n용량: 150W",badge:""},
    {name:"TS-LINE 22 레일등 LED",category:"레일등",subcategory:"레일형",image:"https://ydl.co.kr/web/product/medium/202512/9adb929c168651117af60bec48631dfe.jpg",description:"슬림한 디자인의 TS-LINE 시리즈 레일등. 깔끔한 마감과 고효율 성능을 자랑합니다.",specs:"전압: 220V / 60Hz\n소비전력: 22W",badge:"NEW"},
    {name:"KS. 원볼 스포트 레일 COB 8W",category:"스포트",subcategory:"",image:"https://ydl.co.kr/web/product/medium/202511/447cab0d50743fd982c72963600545c3.jpg",description:"COB 방식의 원볼 스포트 레일등. 집중 조명이 필요한 공간에 최적.",specs:"전압: 220V / 60Hz\n소비전력: 8W\n방식: COB",badge:""},
    {name:"KC. 마그네틱 레일 시스템",category:"마그네틱",subcategory:"",image:"https://ydl.co.kr/web/product/medium/202502/2ece4912db1ce8b5de7b61b36909ac4b.jpg",description:"자유로운 위치 조정이 가능한 마그네틱 레일 시스템. 매입형·일반형 지원.",specs:"전압: DC 48V\n타입: 매입형 / 일반형",badge:"BEST"},
    {name:"KS. COB 공회전 매입등",category:"매입등",subcategory:"원형",image:"https://ydl.co.kr/web/product/medium/202507/134bde483b616eb85c8157c26838ef7a.jpg",description:"3인치 COB 방식 공회전 매입등. 360도 회전으로 다양한 방향 조명 가능.",specs:"전압: 220V / 60Hz\n소비전력: 10W\n크기: 3인치",badge:""},
    {name:"KC. T5 LED 18W 1200",category:"T5",subcategory:"",image:"https://ydl.co.kr/web/product/medium/202412/023d1b2766534dde921f7f3e5ba6c3f8.jpg",description:"고효율 T5 LED 형광등 대체 램프. 기존 형광등 교체 시 바로 사용 가능.",specs:"전압: 220V / 60Hz\n소비전력: 18W\n길이: 1200mm",badge:""},
  ];
};
let currentSrc='';

function switchTab(tab){
  document.querySelectorAll('.detail-tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.dtab').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.detail-tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('dtab-'+tab).classList.add('active');
}

function setMainImg(src,idx){
  const img=document.getElementById('main-img');
  const ph=document.getElementById('main-img-ph');
  img.src=src; img.style.display='block'; ph.style.display='none';
  currentSrc=src;
  document.querySelectorAll('.thumb-item').forEach((t,i)=>t.classList.toggle('active',i===idx));
}

function openZoom(){
  if(!currentSrc) return;
  document.getElementById('zoom-img').src=currentSrc;
  document.getElementById('zoom-overlay').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeZoom(){document.getElementById('zoom-overlay').classList.remove('on');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeZoom();});

document.getElementById('nav-search').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.value.trim())
    location.href='category.html?cat=전체&q='+encodeURIComponent(e.target.value.trim());
});

function buildCatBar(){
  const prods=JSON.parse(localStorage.getItem('yedo_products')||'[]');
  const saved=JSON.parse(localStorage.getItem('yedo_cat_order')||'[]');
  const existing=[...new Set(prods.map(p=>p.category).filter(Boolean))];
  const ordered=saved.length?[...saved,...existing.filter(c=>!saved.includes(c))]:existing;
  const cats=['전체',...ordered];
  const inner=document.getElementById('cat-bar-inner');
  if(!inner) return;
  inner.innerHTML=cats.map(c=>{
    const fromProds=[...new Set(prods.filter(p=>p.category===c&&p.subcategory).map(p=>p.subcategory))];
    const fromSaved=JSON.parse(localStorage.getItem('yedo_subcats_'+c)||'[]');
    const subs=[...new Set([...fromSaved,...fromProds])];
    const dropdown=subs.length?`<div class="cat-dropdown">${subs.map(s=>`<button class="cat-dropdown-item" onclick="event.stopPropagation();location.href='category.html?cat=${encodeURIComponent(c)}&sub=${encodeURIComponent(s)}'">${s}</button>`).join('')}</div>`:'';
    return `<div class="cat-item"><button class="cat-btn" onclick="location.href='category.html?cat=${encodeURIComponent(c)}'">${c}</button>${dropdown}</div>`;
  }).join('');
}
buildCatBar();

function loadProduct(){
  const params=new URLSearchParams(location.search);
  const idx=parseInt(params.get('idx'));
  const prods=getProds();
  const p=prods[idx];
  if(!p){document.body.innerHTML='<div style="padding:80px;text-align:center;color:#aaa;font-family:sans-serif;">제품을 찾을 수 없습니다. <a href="index.html" style="color:#00b8a9;">홈으로</a></div>';return;}

  document.title=p.name+' · YEDO LIGHTING';
  setTimeout(()=>{if(typeof addRecent!=='undefined') addRecent(idx,p.name,p.image,p.category);},100);

  document.getElementById('breadcrumb').innerHTML=
    `<a href="index.html">홈</a> ›
     <a href="category.html?cat=${encodeURIComponent(p.category||'')}"> ${p.category||''}</a> ›
     <span>${p.name}</span>`;

  let bHtml='';
  if(p.badge==='NEW') bHtml+=`<span class="badge badge-new">NEW</span>`;
  if(p.badge==='BEST') bHtml+=`<span class="badge badge-best">BEST</span>`;
  document.getElementById('prod-badges').innerHTML=bHtml;
  document.getElementById('prod-cat-line').textContent=(p.category||'')+(p.subcategory?' · '+p.subcategory:'');
  document.getElementById('prod-name').textContent=p.name||'';

  if(p.description){
    const desc=document.getElementById('prod-desc');
    desc.textContent=p.description;
    desc.style.display='block';
  }

  const imgs=[];
  if(p.image) imgs.push(p.image);
  if(p.images&&Array.isArray(p.images)) imgs.push(...p.images);
  if(imgs.length){
    setMainImg(imgs[0],0);
    document.getElementById('thumb-list').innerHTML=imgs.map((src,i)=>`
      <div class="thumb-item${i===0?' active':''}" onclick="setMainImg('${src}',${i})">
        <img src="${src}" alt="" loading="lazy">
      </div>`).join('');
  }

  const rows=[];
  if(p.specs) p.specs.split('\n').filter(Boolean).forEach(line=>{
    const[k,...v]=line.split(':');
    if(k&&v.length) rows.push([k.trim(),v.join(':').trim()]);
  });
  document.getElementById('spec-table').innerHTML=rows.map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');

  if(p.detail_images&&p.detail_images.length){
    document.getElementById('detail-imgs').innerHTML=p.detail_images.map(src=>`<img src="${src}" alt="" loading="lazy">`).join('');
  }

  // 수동 지정 관련제품만 표시 (미지정시 안 뜸)
  if(p.related_products&&p.related_products.length){
    const related=p.related_products.map(i=>({prod:prods[i],idx:i})).filter(r=>r.prod);
    if(related.length){
      document.getElementById('related-section').style.display='block';
      document.getElementById('related-grid').innerHTML=related.map(r=>`
        <a href="product.html?idx=${r.idx}" class="related-card">
          <div class="related-img">${r.prod.image?`<img src="${r.prod.image}" alt="${r.prod.name}" loading="lazy">`:'<div style="color:#ccc;font-size:12px;">이미지 없음</div>'}</div>
          <div class="related-info"><div class="related-cat">${r.prod.category||''}</div><div class="related-name">${r.prod.name}</div></div>
        </a>`).join('');
    }
  }
}
loadProduct();
</script>

<!-- 최근 본 제품 패널 -->
<div id="recent-panel" style="display:none;position:fixed;right:56px;bottom:60px;z-index:998;width:280px;background:#fff;border:1px solid #e8e8e8;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.15);overflow:hidden;">
  <div style="padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;">
    <span style="font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;color:#1a1a1a;">최근 본 상품</span>
    <button onclick="toggleRecentPanel()" style="background:none;border:none;cursor:pointer;font-size:16px;color:#aaa;">✕</button>
  </div>
  <div id="recent-list" style="max-height:360px;overflow-y:auto;"></div>
</div>

<script>
const RECENT_KEY='yedo_recent';
function getRecent(){try{return JSON.parse(localStorage.getItem(RECENT_KEY))||[];}catch{return[];}}
function saveRecent(list){localStorage.setItem(RECENT_KEY,JSON.stringify(list));}

function addRecent(idx,name,image,category){
  let list=getRecent();
  list=list.filter(r=>r.idx!==idx);
  list.unshift({idx,name,image,category,time:Date.now()});
  if(list.length>10) list=list.slice(0,10);
  saveRecent(list);
}

function renderRecentPanel(){
  const list=getRecent();
  const cnt=document.getElementById('recent-count');
  if(list.length){cnt.style.display='flex';cnt.textContent=list.length;}
  else cnt.style.display='none';
  const el=document.getElementById('recent-list');
  if(!list.length){el.innerHTML='<p style="padding:24px;text-align:center;font-size:13px;color:#aaa;font-family:\'Noto Sans KR\',sans-serif;">최근 본 상품이 없습니다.</p>';return;}
  el.innerHTML=list.map(r=>`
    <a href="product.html?idx=${r.idx}" style="display:flex;align-items:center;gap:10px;padding:10px 14px;text-decoration:none;border-bottom:1px solid #f5f5f5;transition:background 0.15s;" onmouseover="this.style.background='#f9f9f9'" onmouseout="this.style.background=''">
      <div style="width:48px;height:48px;border-radius:4px;background:#f5f5f5;flex-shrink:0;overflow:hidden;">
        ${r.image?`<img src="${r.image}" style="width:100%;height:100%;object-fit:contain;padding:3px;">`:''}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:11px;color:#00b8a9;margin-bottom:2px;font-family:'Noto Sans KR',sans-serif;">${r.category||''}</div>
        <div style="font-size:12px;color:#333;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Noto Sans KR',sans-serif;">${r.name}</div>
      </div>
    </a>`).join('');
}

function toggleRecentPanel(){
  const panel=document.getElementById('recent-panel');
  const isOpen=panel.style.display!=='none';
  panel.style.display=isOpen?'none':'block';
  if(!isOpen) renderRecentPanel();
}

document.addEventListener('click',e=>{
  const panel=document.getElementById('recent-panel');
  const btn=document.getElementById('recent-float-btn');
  if(panel&&panel.style.display!=='none'&&!panel.contains(e.target)&&!btn.contains(e.target))
    panel.style.display='none';
});

renderRecentPanel();
</script>

</body>
