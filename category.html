<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품 · YEDO LIGHTING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
:root{--teal:#00b8a9;--teal-dark:#009e90;--teal-pale:rgba(0,184,169,0.07);--teal-dim:rgba(0,184,169,0.2);--bg:#f5f6f7;--bg2:#fff;--text:#1a1a1a;--text-dim:#555;--text-faint:#aaa;--border:#e8e8e8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;line-height:1.6;}

/* NAV */
nav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.nav-top{display:flex;justify-content:space-between;align-items:center;padding:0 48px;height:88px;gap:20px;}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-size:54px;font-weight:700;letter-spacing:0.06em;color:var(--text);text-decoration:none;flex-shrink:0;line-height:1;transform:scaleY(0.85);transform-origin:left center;display:inline-block;}
.nav-logo span{color:var(--teal);}
.nav-logo small{display:block;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:300;letter-spacing:0.18em;color:var(--text-faint);margin-top:1px;transform:scaleY(1.176);transform-origin:left center;}
.nav-right{display:flex;align-items:center;gap:24px;flex:1;justify-content:flex-end;}
.nav-links{display:flex;gap:28px;}
.nav-links a{font-size:15px;color:var(--text-dim);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--teal);}
.nav-center{position:relative;max-width:280px;min-width:180px;}
.nav-search{width:100%;background:#f5f6f7;border:1px solid var(--border);border-radius:22px;padding:8px 16px 8px 38px;font-size:15px;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.2s;}
.nav-search:focus{border-color:var(--teal);}
.nav-search::placeholder{color:var(--text-faint);}
.nav-search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:14px;pointer-events:none;}
.nav-contact{font-size:14px;font-weight:500;color:#fff;background:var(--teal);padding:8px 20px;border-radius:3px;text-decoration:none;transition:background 0.2s;}
.nav-contact:hover{background:var(--teal-dark);}

/* TOP CAT BAR */
.top-cat-bar{border-bottom:1px solid var(--border);background:#fff;padding:0 48px;overflow-x:auto;scrollbar-width:none;}
.top-cat-bar::-webkit-scrollbar{display:none;}
.top-cat-inner{display:flex;}
.top-cat-btn{font-size:15px;color:var(--text-dim);background:none;border:none;border-bottom:2px solid transparent;padding:12px 18px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:color 0.2s,border-color 0.2s;}
.top-cat-btn:hover{color:var(--teal);}
.top-cat-btn.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500;}

/* BREADCRUMB */
.breadcrumb{padding:12px 48px;font-size:12px;color:var(--text-faint);background:var(--bg);border-bottom:1px solid var(--border);}
.breadcrumb a{color:var(--text-faint);text-decoration:none;}
.breadcrumb a:hover{color:var(--teal);}

/* LAYOUT */
.page-wrap{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 200px);}

/* SIDEBAR */
.sidebar{background:#fff;border-right:1px solid var(--border);padding:32px 0;position:sticky;top:148px;height:calc(100vh - 148px);overflow-y:auto;}
.sidebar-cat-title{font-size:22px;font-weight:700;color:var(--text);padding:0 28px 16px;border-bottom:2px solid var(--text);margin-bottom:20px;}
.sidebar-label{font-size:11px;font-weight:500;color:var(--text-faint);letter-spacing:0.12em;padding:0 28px;margin-bottom:8px;text-transform:uppercase;}
.sidebar-item{display:flex;justify-content:space-between;align-items:center;padding:9px 28px;font-size:15px;color:var(--text-dim);cursor:pointer;background:none;border:none;font-family:inherit;width:100%;text-align:left;transition:color 0.15s,background 0.15s;border-left:3px solid transparent;}
.sidebar-item:hover{color:var(--text);background:var(--bg);}
.sidebar-item.active{color:var(--teal);font-weight:500;border-left-color:var(--teal);}
.sidebar-count{font-size:12px;color:var(--text-faint);}
.sidebar-divider{height:1px;background:var(--border);margin:16px 28px;}

/* CONTENT */
.content{padding:32px 40px 80px;}
.content-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.content-title{font-size:24px;font-weight:700;color:var(--text);}
.content-count{font-size:13px;color:var(--text-faint);}

/* SEARCH BAR */
.content-search{margin-bottom:20px;}
.content-search input{width:100%;max-width:360px;background:#fff;border:1px solid var(--border);border-radius:4px;padding:9px 16px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color 0.2s;}
.content-search input:focus{border-color:var(--teal);}

/* GRID */
.product-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.product-card{background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:box-shadow 0.25s,border-color 0.25s,transform 0.2s;text-decoration:none;display:block;}
.product-card:hover{box-shadow:0 6px 24px rgba(0,184,169,0.11);border-color:var(--teal-dim);transform:translateY(-2px);}
.prod-img-wrap{aspect-ratio:1;background:#f8f9f9;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.prod-img-wrap img{width:100%;height:100%;object-fit:contain;transition:transform 0.3s;}
.product-card:hover .prod-img-wrap img{transform:scale(1.04);}
.prod-badge{position:absolute;top:10px;left:10px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:2px;}
.badge-new{background:var(--teal);color:#fff;}
.badge-best{background:#e74c3c;color:#fff;}
.prod-info{padding:12px 14px 16px;}
.prod-cat{font-size:11px;color:var(--teal);letter-spacing:0.07em;margin-bottom:4px;text-transform:uppercase;}
.prod-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;}
.empty-state{grid-column:1/-1;padding:80px 0;text-align:center;color:var(--text-faint);}
.load-wrap{text-align:center;margin-top:36px;}
.load-btn{font-size:14px;color:var(--teal);border:1px solid var(--teal);background:none;padding:11px 44px;border-radius:3px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.load-btn:hover{background:var(--teal);color:#fff;}

@media(max-width:1100px){.product-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:900px){
  .nav-top{padding:0 20px;height:60px;}.nav-logo{font-size:34px;}.nav-links{display:none;}
  .top-cat-bar{padding:0 16px;}
  .breadcrumb{padding:10px 20px;}
  .page-wrap{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:16px 0;display:flex;overflow-x:auto;white-space:nowrap;gap:0;}
  .sidebar-cat-title,.sidebar-label,.sidebar-divider{display:none;}
  .sidebar-item{display:inline-flex;padding:8px 16px;border-left:none;border-bottom:2px solid transparent;width:auto;white-space:nowrap;}
  .sidebar-item.active{border-left:none;border-bottom-color:var(--teal);}
  .content{padding:20px 16px 60px;}
  .product-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-top">
    <a href="index.html" class="nav-logo"><span>YEDO</span> LIGHTING<small>예도전기조명</small></a>
    <div class="nav-right">
      <div class="nav-links">
        <a href="index.html#about">회사소개</a>
        <a href="index.html#catalogue-anchor">카탈로그</a>
        <a href="index.html#contact">문의</a>
      </div>
      <div class="nav-center">
        <span class="nav-search-ico">🔍</span>
        <input class="nav-search" type="text" id="nav-search" placeholder="제품명으로 검색...">
      </div>
      <span style="display:inline-flex;align-items:center;gap:6px;font-size:18px;font-weight:500;color:var(--text-dim);white-space:nowrap;line-height:1;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;display:block;margin-top:3px;"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z" fill="var(--teal)"/></svg>031-977-1585</span>
      <a href="index.html#contact" class="nav-contact">문의하기</a>
    </div>
  </div>
  <div class="top-cat-bar">
    <div class="top-cat-inner" id="top-cat-inner"></div>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">홈</a> › <span id="bc-cat">전체 제품</span>
</div>

<div class="page-wrap">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- CONTENT -->
  <div class="content">
    <div class="content-header">
      <h1 class="content-title" id="content-title">전체 제품</h1>
      <span class="content-count" id="content-count"></span>
    </div>
    <div class="product-grid" id="product-grid"></div>
    <div class="load-wrap" id="load-wrap" style="display:none;">
      <button class="load-btn" id="load-btn">더 보기</button>
    </div>
  </div>
</div>

<script>
const SK='yedo_products';
let _yedoData=null;
async function loadYedoData(){
  if(_yedoData) return _yedoData;
  try{const r=await fetch('yedo-data.json?v='+Date.now());if(r.ok)_yedoData=await r.json();}catch(e){}
  return _yedoData||{};
}
function getVal(k){
  if(_yedoData&&_yedoData[k]!==undefined) return _yedoData[k];
  try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}
}
function getProds(){return getVal(SK)||[];}
let allProds=[];
const params=new URLSearchParams(location.search);
let activeCat=params.get('cat')||'전체';
let activeSubCat=params.get('sub')||'';
let searchQuery=params.get('q')||'';
let visible=20;

function getCats(){
  const saved=getVal('yedo_cat_order')||[];
  const existing=[...new Set(allProds.map(p=>p.category).filter(Boolean))];
  const ordered=saved.length?[...saved,...existing.filter(c=>!saved.includes(c))]:existing;
  return['전체',...ordered];
}
function getSubCats(cat){
  const fromProds=[...new Set(allProds.filter(p=>p.category===cat&&p.subcategory).map(p=>p.subcategory))];
  const fromSaved=getVal('yedo_subcats_'+cat)||[];
  return[...new Set([...fromSaved,...fromProds])];
}

function renderTopBar(){
  const cats=getCats();
  const cur=searchQuery?'전체':activeCat;
  document.getElementById('top-cat-inner').innerHTML=cats.map(c=>`
    <button class="top-cat-btn${c===cur?' active':''}" onclick="selectCat('${c}')">${c}</button>
  `).join('');
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  if(searchQuery){sb.innerHTML='';return;}

  if(activeCat==='전체'){
    // 전체일 때: 카테고리 목록
    const cats=getCats().filter(c=>c!=='전체');
    sb.innerHTML=`
      <div class="sidebar-cat-title">전체 제품</div>
      <div class="sidebar-label">카테고리</div>
      ${cats.map(c=>{
        const cnt=allProds.filter(p=>p.category===c).length;
        return `<button class="sidebar-item" onclick="selectCat('${c}')">${c}<span class="sidebar-count">(${cnt})</span></button>`;
      }).join('')}`;
  } else {
    // 특정 카테고리: 서브카테고리
    const subs=getSubCats(activeCat);
    const total=allProds.filter(p=>p.category===activeCat).length;
    sb.innerHTML=`
      <div class="sidebar-cat-title">${activeCat}</div>
      <div class="sidebar-label">서브카테고리</div>
      <button class="sidebar-item${!activeSubCat?' active':''}" onclick="selectSubCat('')">전체<span class="sidebar-count">(${total})</span></button>
      ${subs.map(s=>{
        const cnt=allProds.filter(p=>p.category===activeCat&&p.subcategory===s).length;
        return `<button class="sidebar-item${activeSubCat===s?' active':''}" onclick="selectSubCat('${s}')">${s}<span class="sidebar-count">(${cnt})</span></button>`;
      }).join('')}
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">다른 카테고리</div>
      ${getCats().filter(c=>c!=='전체'&&c!==activeCat).map(c=>`
        <button class="sidebar-item" onclick="selectCat('${c}')">${c}</button>
      `).join('')}`;
  }
}

function renderProducts(){
  let filtered;
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    filtered=allProds.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q));
  } else {
    filtered=allProds.filter(p=>{
      const mc=activeCat==='전체'||p.category===activeCat;
      const ms=!activeSubCat||p.subcategory===activeSubCat;
      return mc&&ms;
    });
  }
  const title=searchQuery?`"${searchQuery}" 검색 결과`:activeCat==='전체'?'전체 제품':activeCat+(activeSubCat?' · '+activeSubCat:'');
  document.getElementById('content-title').textContent=title;
  document.getElementById('bc-cat').textContent=activeCat==='전체'?'전체 제품':activeCat;
  document.getElementById('content-count').textContent=`총 ${filtered.length}개`;
  const grid=document.getElementById('product-grid');
  const slice=filtered.slice(0,visible);
  if(!slice.length){
    grid.innerHTML='<div class="empty-state"><p>제품이 없습니다.</p></div>';
    document.getElementById('load-wrap').style.display='none';
    return;
  }
  grid.innerHTML=slice.map(p=>{
    const img=p.image?`<img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'">` :'';
    const badge=p.badge?`<span class="prod-badge badge-${p.badge==='NEW'?'new':'best'}">${p.badge}</span>`:'';
    return `<a href="product.html?name=${encodeURIComponent(p.name)}" class="product-card">
      <div class="prod-img-wrap">${img}${badge}</div>
      <div class="prod-info">
        <div class="prod-cat">${p.category||''}${p.subcategory?' · '+p.subcategory:''}</div>
        <div class="prod-name">${p.name}</div>
      </div>
    </a>`;
  }).join('');
  const lw=document.getElementById('load-wrap');
  if(filtered.length>visible){lw.style.display='block';document.getElementById('load-btn').textContent=`더 보기 (${filtered.length-visible}개 남음)`;}
  else lw.style.display='none';
}

function updateUI(){renderTopBar();renderSidebar();renderProducts();}
function selectCat(cat){activeCat=cat;activeSubCat='';searchQuery='';visible=20;document.getElementById('nav-search').value='';history.replaceState(null,'',`category.html?cat=${encodeURIComponent(cat)}`);updateUI();}
function selectSubCat(sub){activeSubCat=sub;visible=20;document.getElementById('nav-search').value='';history.replaceState(null,'',`category.html?cat=${encodeURIComponent(activeCat)}&sub=${encodeURIComponent(sub)}`);updateUI();}
function doSearch(q){searchQuery=q;visible=20;history.replaceState(null,'','category.html');updateUI();}
document.getElementById('nav-search').addEventListener('input',e=>doSearch(e.target.value.trim()));
document.getElementById('load-btn').addEventListener('click',()=>{visible+=20;renderProducts();});
if(searchQuery)document.getElementById('nav-search').value=searchQuery;
(async function(){
  await loadYedoData();
  allProds=getProds().filter(p=>p.visible!==false);
  updateUI();
})();
</script>

<div id="float-btns" style="position:fixed;right:0;bottom:60px;z-index:999;display:flex;flex-direction:column;gap:0;align-items:center;">
  <a href="https://pf.kakao.com/_LFwMn" target="_blank" style="width:68px;height:68px;background:#FEE500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;border-radius:10px 0 0 0;"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M18 6C11.373 6 6 10.477 6 16c0 3.632 2.13 6.812 5.347 8.666-.213.77-.77 2.795-.882 3.228-.138.535.196.527.413.384.17-.113 2.692-1.83 3.789-2.576.757.107 1.536.164 2.333.164 6.627 0 12-4.477 12-10S24.627 6 18 6z" fill="#3C1E1E"/></svg><span style="font-size:10px;font-weight:700;color:#3C1E1E;font-family:sans-serif;line-height:1;">상담</span></a>
  <button onclick="toggleRecentPanel()" id="recent-float-btn" style="width:68px;height:68px;background:#1a1f3a;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;position:relative;"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#fff" stroke-width="1.5"/><path d="M12 7v5l3 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg><span style="font-size:10px;font-weight:700;color:#fff;font-family:sans-serif;line-height:1;">최근</span><span id="recent-count" style="position:absolute;top:4px;right:4px;background:#00b8a9;color:#fff;font-size:8px;font-weight:700;width:14px;height:14px;border-radius:50%;display:none;align-items:center;justify-content:center;font-family:sans-serif;"></span></button>
  <button onclick="window.scrollTo({top:0,behavior:'smooth'})" style="width:68px;height:68px;background:#00b04a;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border-radius:0 0 0 10px;"><svg width="26" height="26" viewBox="0 0 20 20" fill="none"><path d="M5 13l5-5 5 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="font-size:10px;font-weight:700;color:#fff;font-family:sans-serif;line-height:1;">TOP</span></button>
</div>
<div id="recent-panel" style="display:none;position:fixed;right:72px;bottom:60px;z-index:998;width:280px;background:#fff;border:1px solid #e8e8e8;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.15);overflow:hidden;">
  <div style="padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;"><span style="font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;color:#1a1a1a;">최근 본 상품</span><button onclick="toggleRecentPanel()" style="background:none;border:none;cursor:pointer;font-size:16px;color:#aaa;">✕</button></div>
  <div id="recent-list" style="max-height:360px;overflow-y:auto;"></div>
</div>
<script>
const RECENT_KEY='yedo_recent';
function getRecent(){try{return JSON.parse(localStorage.getItem(RECENT_KEY))||[];}catch{return[];}}
function renderRecentPanel(){
  const list=getRecent();
  const cnt=document.getElementById('recent-count');
  if(list.length){cnt.style.display='flex';cnt.textContent=list.length;}else cnt.style.display='none';
  const el=document.getElementById('recent-list');
  if(!list.length){el.innerHTML='<p style="padding:24px;text-align:center;font-size:13px;color:#aaa;font-family:\'Noto Sans KR\',sans-serif;">최근 본 상품이 없습니다.</p>';return;}
  el.innerHTML=list.map(r=>`<a href="product.html?name=${encodeURIComponent(r.name||'')}" style="display:flex;align-items:center;gap:10px;padding:10px 14px;text-decoration:none;border-bottom:1px solid #f5f5f5;" onmouseover="this.style.background='#f9f9f9'" onmouseout="this.style.background=''"><div style="width:48px;height:48px;border-radius:4px;background:#f5f5f5;flex-shrink:0;overflow:hidden;">${r.image?`<img src="${r.image}" style="width:100%;height:100%;object-fit:contain;padding:3px;">`:''}  </div><div style="flex:1;min-width:0;"><div style="font-size:11px;color:#00b8a9;margin-bottom:2px;">${r.category||''}</div><div style="font-size:12px;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.name}</div></div></a>`).join('');
}
function toggleRecentPanel(){const panel=document.getElementById('recent-panel');const isOpen=panel.style.display!=='none';panel.style.display=isOpen?'none':'block';if(!isOpen)renderRecentPanel();}
document.addEventListener('click',e=>{const panel=document.getElementById('recent-panel');const btn=document.getElementById('recent-float-btn');if(panel&&panel.style.display!=='none'&&!panel.contains(e.target)&&!btn.contains(e.target))panel.style.display='none';});
renderRecentPanel();
</script>
</body>
